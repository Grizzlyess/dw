<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚠️ Aviso</title>
    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body>
    <div class="botoes-container">
      <button onclick="abrirAlerta()">Clique aqui !!!</button>
      <button onclick="abrirAlerta2()">Clique aqui também!!!</button>
    </div>
    <script>
      function abrirAlerta() {
        Swal.fire({
          title: "Você acordou o gatinho...",
          text: "Ele tá chateado, faça um pix para deixar ele feliz!!!",
          imageUrl: "imagem/cat.png",
          showCancelButton: true,
          confirmButtonText: "Sim",
          cancelButtonText: "Não",
          heightAuto: false,

          customClass: {
            actions: "botoes-alerta1",
            title: 'titulo-alerta1',
          },
        });
      }

      function abrirAlerta2() {
        Swal.fire({
          title: "Você caiu num phishing!!!",
          text: "Quem mandou apertar botão estranho? Faça um pix para recuperar seus dados!!!",
          imageUrl: "imagem/cat2.png",
          showCancelButton: true,
          confirmButtonText: "Sim",
          cancelButtonText: "Não",
          heightAuto: false,

          customClass: {
            image: "gatinho-phishing",
            title: "titulo-phishing",
          },
        });
      }
    </script>
  </body>
</html>
