<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login</title>
    <link rel="stylesheet" href="style.css" />

    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  </head>
  <body>
    <button onclick="abrirAlerta()">Clique aqui!!!</button>

    <script>
      function abrirAlerta() {
        swal({
          title: "Você acordou o gatinho...",
          text: "Ele tá chateado, faça um pix para deixar ele feliz!!!",
          icon: "imagem/cat.png",
          buttons: {
            cancel: "Não",
            confirm: "Sim!",
          },
        });
      }
    </script>
  </body>
</html>
