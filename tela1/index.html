<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela Android - Feed</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="android-screen">
      <div class="top-icons">
        <img src="imagem/menu.svg" alt="Menu" class="icon icon-1" />
        <img src="imagem/search.svg" alt="Buscar" class="icon icon-2" />
        <img src="imagem/curtir.svg" alt="Curtir" class="icon icon-3" />
        <div class="profile-avatar icon-4">M</div>
      </div>

      <div class="scroll-area">
        <div class="post-card">
          <div class="post-header">
            <div class="user-avatar">M</div>
            <span class="username">grizzlyees</span>
          </div>

          <div class="post-image">
            <img src="imagem/post.jpg" alt="Post" />
          </div>

          <div class="post-actions">
            <div class="action-icon">
              <img
                src="imagem/star.svg"
                alt="Ícone 1"
                class="post-icon post-icon-1"
              />
            </div>

            <div class="action-icon">
              <img
                src="imagem/comentar.svg"
                alt="Ícone 2"
                class="post-icon post-icon-2"
              />
            </div>
          </div>

          <div class="post-content">
            <span class="likes">128 favoritos</span>
            <div class="caption">
              <strong>grizzlyess</strong> Melhor filme da vida!!! 🌟
            </div>
            <span class="view-comments">Ver todos os 14 comentários</span>
          </div>
        </div>
      </div>

      <div class="bottom-icons">
        <img
          src="imagem/compartilhar.svg"
          alt="Home"
          class="bottom-icon bottom-icon-1"
        />
        <img
          src="imagem/publicar.svg"
          alt="Favoritos"
          class="bottom-icon bottom-icon-2"
        />
        <img
          src="imagem/mais.svg"
          alt="Adicionar"
          class="bottom-icon bottom-icon-3"
        />
        <img
          src="imagem/config.svg"
          alt="Perfil"
          class="bottom-icon bottom-icon-4"
        />
      </div>
    </div>
  </body>
</html>
