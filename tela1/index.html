<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="android-screen">
      <div class="bottom-superior">
        <img src="imagem/menu.svg" alt="Menu" class="icon menu" />
        <img src="imagem/search.svg" alt="Buscar" class="icon buscar" />
        <img src="imagem/curtir.svg" alt="Curtir" class="icon curtir" />
        <div class="perfil icon">M</div>
      </div>

      <div class="scroll-area">
        <div class="post-card">
          <div class="post-cabeçalho">
            <div class="user-perfil">M</div>
            <span class="username">grizzlyess</span>
          </div>

          <div class="post-imagem">
            <img src="imagem/post.jpg" alt="Post" />
          </div>

          <div class="post-bottom">
            <div class="action-icon">
              <img
                src="imagem/star.svg"
                alt="Favoritar"
                class="post-icon favoritar"
              />
            </div>

            <div class="action-icon">
              <img
                src="imagem/comentar.svg"
                alt="Comentar"
                class="post-icon comentar"
              />
            </div>
          </div>

          <div class="post-dados">
            <span class="likes">128 favoritos</span>
            <div class="legenda">
              <strong>grizzlyess</strong> Melhor filme da vida!!! 🌟
            </div>
            <span class="comentarios">Ver todos os 14 comentários</span>
          </div>
        </div>
      </div>

      <div class="bottom-inferior">
        <img
          src="imagem/compartilhar.svg"
          alt="Compartilhar"
          class="bottom-icon compartilhar"
        />
        <img
          src="imagem/publicar.svg"
          alt="Publicar"
          class="bottom-icon publicar"
        />
        <img
          src="imagem/mais.svg"
          alt="Mais"
          class="bottom-icon mais"
        />
        <img
          src="imagem/config.svg"
          alt="Configurações"
          class="bottom-icon config"
        />
      </div>
    </div>
  </body>
</html>
