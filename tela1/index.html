<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela Android - Feed</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="android-screen">
      <div class="top-icons">
        <img src="imagem/menu.svg" alt="Menu" class="icon icon-1" />
        <img src="imagem/search.svg" alt="Buscar" class="icon icon-2" />
        <img src="imagem/curtir.svg" alt="Curtir" class="icon icon-3" />
        <div class="profile-avatar icon-4">M</div>
      </div>

      <div class="scroll-area">
        <div class="post-card">
          <div class="post-header">
            <div class="user-avatar">M</div>
            <span class="username">grizzlyees</span>
          </div>

          <div class="post-image">
            <img src="imagem/post.jpg" alt="Post" />
          </div>

          <div class="post-actions">
            <div class="action-icon">
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polygon
                  points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                ></polygon>
              </svg>
            </div>
            <div class="action-icon">
              <svg
                width="22"
                height="22"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"
                ></path>
              </svg>
            </div>
          </div>

          <div class="post-content">
            <span class="likes">128 favoritos</span>
            <div class="caption">
              <strong>grizzlyess</strong> Melhor filme da vida!!! 🌟
            </div>
            <span class="view-comments">Ver todos os 14 comentários</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
