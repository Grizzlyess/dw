<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tela Android - Feed</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #2c2c2c;
        font-family: 'Poppins', sans-serif;
    }

    .android-screen {
        width: 360px;
        height: 640px;
        background-image: url('imagem/fundo3.png'); 
        background-color: #f5f5f5;
        background-size: cover; 
        background-position: center;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column; 
    }

    .top-header {
        background-color: transparent; 
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 16px; 
        z-index: 10; 
    }

    .menu-btn, .search-text-btn {
        background: transparent;
        border: none;
        color: #ffffff;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
    }

    .search-text-btn {
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        font-weight: 500;
        gap: 6px;
    }

    .profile-avatar {
        width: 26px;
        height: 26px;
        background-color: #87CEEB; 
        color: #ffffff;
        border-radius: 50%; 
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: 500;
        font-size: 12px;
    }

    .scroll-area {
        flex: 1; 
        overflow-y: auto; 
        padding-top: 80px;
        padding-bottom: 20px; 
    }

    .scroll-area::-webkit-scrollbar {
        display: none;
    }

    .post-card {
        background-color: #F0F8FF; 
        border-radius: 16px;
        margin: 0px 28px 20px 28px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
        overflow: hidden; 
    }

    .post-header {
        display: flex;
        align-items: center;
        padding: 10px 14px;
        gap: 10px;
    }

    .post-header .user-avatar {
        width: 32px;
        height: 32px;
        background-color: #87CEEB;
        color: #fff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        font-weight: 500;
    }

    .post-header .username {
        font-size: 13px;
        font-weight: 600;
        color: #333;
    }

    .post-image img {
        width: 100%;
        height: 220px; 
        object-fit: cover; 
        display: block;
    }

    .post-actions {
        display: flex;
        padding: 10px 14px 4px 14px;
        gap: 16px;
    }

    .action-icon {
        cursor: pointer;
        color: #333;
    }

    .action-icon:hover {
        opacity: 0.7;
    }

    .post-content {
        padding: 0 14px 14px 14px;
        font-size: 12px; 
        color: #333;
    }

    .post-content .likes {
        font-weight: 600;
        margin-bottom: 4px;
        display: block;
    }

    .post-content .caption strong {
        font-weight: 600;
        margin-right: 4px;
    }

    .post-content .view-comments {
        color: #888;
        margin-top: 6px;
        display: block;
        font-size: 11px;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="android-screen">
    
    <div class="top-header">
        <button class="menu-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <button class="search-text-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            Buscar
        </button>

        <div class="profile-avatar">M</div>
    </div>

    <div class="scroll-area">
        
        <div class="post-card">
            <div class="post-header">
                <div class="user-avatar">M</div>
                <span class="username">grizzlyees</span>
            </div>

            <div class="post-image">
                <img src="imagem/post.jpg" alt="Post">
            </div>

            <div class="post-actions">
                <div class="action-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>
                <div class="action-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
                    </svg>
                </div>
            </div>

            <div class="post-content">
                <span class="likes">128 favoritos</span>
                <div class="caption">
                    <strong>grizzlyess</strong> Melhor filme da vida!!! 🌟
                </div>
                <span class="view-comments">Ver todos os 14 comentários</span>
            </div>
        </div>

    </div>

</div>

</body>
</html>
